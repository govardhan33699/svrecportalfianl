{% load static %} <!DOCTYPE html> <html lang="en">  <head>     <meta charset="utf-8">     <meta http-equiv="X-UA-Compatible" content="IE=edge">     <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">     <title>College ERP - Password Reset</title>      <!-- Favicon -->     <link rel="shortcut icon" href="{% static '/image/favicon1.ico' %}">      <!-- ERPNext Style CSS -->     <link rel="stylesheet" href="{% static 'dist/css/erpnext-style.css' %}">      <!-- Font Awesome -->     <link rel="stylesheet" href="{% static 'plugins/fontawesome-free/css/all.min.css' %}">      <!-- Bootstrap CSS -->     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"> 
    <style>
        .login-container {
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%) !important;
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            min-height: 100vh !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            z-index: 9999 !important;
            padding: 24px !important;
        }
        
        .login-card {
            background: rgba(255, 255, 255, 0.72) !important;
            backdrop-filter: blur(24px) !important;
            -webkit-backdrop-filter: blur(24px) !important;
            border: 1px solid rgba(255, 255, 255, 0.5) !important;
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.04) !important;
            border-radius: 24px !important;
            padding: 2.5rem !important;
            width: 100% !important;
            max-width: 440px !important;
            position: relative !important;
            z-index: 10000 !important;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.8) !important;
            border: 1px solid rgba(0, 0, 0, 0.06) !important;
            border-radius: 12px !important;
            padding: 0.75rem 1rem !important;
            transition: all 0.3s ease !important;
        }

        .form-control:focus {
            background: #ffffff !important;
            border-color: #4361ee !important;
            box-shadow: 0 0 0 4px rgba(67, 97, 238, 0.15) !important;
        }

        .btn-primary {
            background: #4361ee !important;
            border: none !important;
            border-radius: 12px !important;
            padding: 0.75rem !important;
            font-weight: 600 !important;
            transition: transform 0.2s ease, box-shadow 0.2s ease !important;
        }

        .btn-primary:hover {
            transform: translateY(-2px) !important;
            box-shadow: 0 4px 12px rgba(67, 97, 238, 0.25) !important;
        }
        
        .login-title {
            font-weight: 800 !important;
            letter-spacing: 2px !important;
            color: #1e293b !important;
            margin-bottom: 0px !important;
        }
        
        .login-subtitle {
            color: #64748b !important;
            font-size: 0.9rem !important;
            margin-bottom: 1.5rem !important;
        }
    </style>
</head>  
<body>     <div class="login-container">         <div class="login-card">             <div class="login-logo">                 <h1 class="login-title">SVREC</h1>                 <p class="login-subtitle">Education Management System</p>             </div>
              {% block content %}{% endblock %}              <!-- Footer -->             <div class="login-footer text-center mt-4">                 <small class="text-muted">                     &copy; SVREC College. All rights reserved.                 </small>             </div>
         </div>
     </div>
      <!-- Scripts -->     <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>     <script src="{% static 'plugins/jquery/jquery.min.js' %}"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            // Add 'form-control' class to form inputs for consistent styling
            var formInputs = document.querySelectorAll('form input[type="text"], form input[type="email"], form input[type="password"]');
            formInputs.forEach(function (input) {
                input.classList.add('form-control');
            });
        });
    </script>
</body>

</html>
