<style>
    .cf-checkbox-row {
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .cf-checkbox-row input[type="checkbox"] {
        width: 18px !important;
        height: 18px !important;
        min-width: 18px !important;
        appearance: auto !important;
        -webkit-appearance: checkbox !important;
        accent-color: #2563eb;
    }

    .dark-mode .cf-checkbox-row input[type="checkbox"] {
        accent-color: #60a5fa;
    }
</style>

<form role="form" method="POST" enctype="multipart/form-data">
    {% csrf_token %}
    <div class="card-body">
        {% for field in form %}
        <div class="form-group" style="margin-bottom:20px;">
            {% if field.errors %}
            <div style="background:rgba(248,113,113,0.1); border:1px solid rgba(248,113,113,0.2); border-radius:10px; padding:8px 14px; margin-bottom:8px; font-size:12.5px; color:#dc2626;">
                {{ field.errors }}
            </div>
            {% endif %}
            
            {% if field.field.widget.input_type == 'checkbox' %}
            <!-- Checkbox Field -->
            <div class="cf-checkbox-row">
                {{ field }}
                <label for="{{ field.id_for_label }}" style="margin: 0; font-weight:600; font-size:13px; color:var(--text-primary, #1e293b); cursor: pointer;">
                    {{ field.label }}
                </label>
            </div>
            {% if field.help_text %}
            <small style="display:block; margin-top:6px; color:#94a3b8; font-size:12px;">{{field.help_text|safe}}</small>
            {% endif %}
            {% else %}
            <!-- Other Fields -->
            <label for="{{ field.id_for_label }}" style="display:block; margin-bottom:6px; font-weight:600; font-size:13px; color:var(--text-primary, #1e293b);">
                {{ field.label }}
            </label>
            {{ field }}
            {% endif %}
        </div>
        {% endfor %}
    </div>

    <div class="card-footer" style="background:transparent; border-top:1px solid rgba(0,0,0,0.04); padding:20px 24px;">
        <button type="submit" class="btn btn-success" style="width:100%; padding:12px; font-size:14px; font-weight:650; border-radius:14px;">
            <i class="fas fa-check-circle me-2"></i>
            {% if button_text %}
            {{ button_text }}
            {% else %}
            Submit
            {% endif %}
        </button>
    </div>
</form>
