{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>svrec</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="{% static 'plugins/fontawesome-free/css/all.min.css' %}">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --primary-blue: #071320;
            --dark-navy: #1e225f;
            --text-main: #333;
            --text-muted: #666;
            --glass-white: rgba(255, 255, 255, 0.95);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* Blurred Background Layer */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: url("{% static 'image/svrecbg.webp' %}");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: blur(6px); /* Adds the slight blur */
            transform: scale(1.05); /* Fixes white edges caused by blur filtering */
            z-index: -1; /* Keeps it behind your login card */
        }

        .login-master-container {
            width: 100%;
            max-width: 750px;
            background: var(--glass-white);
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.4);
            position: relative;
        }

        /* Banner Header */
        .login-header {
            width: 100%;
            border-bottom: 1px solid #eee;
            padding: 0;
            background: #fff;
            max-height: 160px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-header img {
            width: 100%;
            height: auto;
            max-width: none;
            display: block;
            object-fit: contain;
        }

        /* Two Column Body */
        .login-body {
            display: flex;
            min-height: auto; /* Shrinks layout to hug content tightly */
            position: relative;
        }

        .login-right {
            flex: 1;
            padding: 35px 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #fff;
            position: relative;
            transition: all 0.5s ease;
        }

        /* Step Containers */
        .step-container {
            width: 100%;
            max-width: 320px; /* Reduces width of input and button */
            margin: 0 auto; /* Centers the container inside the <form> */
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.4s ease, opacity 0.4s ease;
        }

        .step-2 {
            display: none;
            opacity: 0;
            transform: translateX(40px);
        }

        .step-1 {
            opacity: 1;
            transform: translateX(0);
        }

        /* Back Arrow */
        .btn-back {
            position: absolute;
            left: 30px;
            top: 20px;
            font-size: 20px;
            color: #666;
            cursor: pointer;
            transition: color 0.2s;
            display: none;
            z-index: 10;
        }

        .btn-back:hover {
            color: var(--primary-blue);
        }

        /* Right Column Form Elements */
        .user-avatar-wrapper {
            margin-bottom: 30px;
        }

        .user-avatar {
            width: 70px;
            height: 70px;
            background: #0b0101;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 30px;
            box-shadow: 0 5px 15px rgba(97, 151, 230, 0.4);
            object-fit: cover;
            border: 2px solid #fff;
        }

        .form-group-custom {
            width: 100%;
            margin-bottom: 15px;
            position: relative;
        }

        .input-wrapper {
            display: flex;
            background: #f1f3f4;
            border-radius: 10px;
            border: 1px solid #ddd;
            overflow: hidden;
            transition: border-color 0.3s;
            position: relative; /* For absolutely positioned balanced icons */
        }

        .input-wrapper:focus-within {
            border-color: var(--primary-blue);
        }

        .input-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: transparent !important; /* Removes offsetting gray box */
            padding: 0;
            color: #777;
            display: flex;
            align-items: center;
            z-index: 2;
        }

        .input-wrapper input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 10px 12px;
            font-size: 0.95rem;
            color: #444;
            outline: none;
            text-align: center; /* Centers text inside input box */
        }

        .btn-next,
        .btn-submit {
            width: 100%;
            background: var(--primary-blue);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            margin-top: 5px;
            transition: filter 0.2s, transform 0.1s;
        }

        .btn-next:hover,
        .btn-submit:hover {
            filter: brightness(1.1);
        }

        .btn-next:active,
        .btn-submit:active {
            transform: scale(0.98);
        }

        .forgot-pass {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #888;
            text-decoration: none;
        }

        .forgot-pass:hover {
            text-decoration: underline;
        }

        /* Error Messages */
        .alert-custom {
            width: 100%;
            background: #fff0f0;
            border: 1px solid #ffcccc;
            color: #d8000c;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 0.9rem;
        }

        /* Loading Spinner */
        .loading-next {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, .3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin-left: 10px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .login-right {
                padding: 40px 30px;
            }
        }
    </style>
</head>

<body>

    <div class="login-master-container">
        <!-- Banner Header -->
        <header class="login-header">
            <img src="{% static 'image/college-header.jpg' %}" alt="SVR Engineering College Banner">
        </header>

        <!-- Main Body -->
        <div class="login-body">
            <!-- Right Login Form -->
            <div class="login-right">

                <!-- Back Arrow -->
                <div class="btn-back" onclick="goBack()"><i class="fas fa-arrow-left"></i></div>

                <div class="user-avatar-wrapper">
                    <img src="" id="userProfilePic" class="user-avatar" style="display: none;">
                    <div class="user-avatar" id="defaultAvatar">
                        <i class="fas fa-user"></i>
                    </div>
                </div>

                <form action="{% url 'user_login' %}" method="post" style="width: 100%;" id="loginForm">
                    {% csrf_token %}

                    {% if messages %}
                    {% for message in messages %}
                    {% if message.tags == 'error' %}
                    <div class="alert-custom" id="djangoMessages">
                        <i class="fas fa-exclamation-circle"></i> {{ message }}
                    </div>
                    {% endif %}
                    {% endfor %}
                    {% endif %}

                    <div id="ajaxAlert" class="alert-custom" style="display: none; min-height: 44px;"></div>

                    <!-- Step 1: Username -->
                    <div class="step-container step-1" id="step1">
                        <div class="form-group-custom">
                            <div class="input-wrapper">
                                <span class="input-icon"><i class="fas fa-user-alt"></i></span>
                                <input type="email" placeholder="User Name" name="email" id="emailInput" required>
                            </div>
                        </div>
                        <button type="button" class="btn-next" onclick="checkUsername()">
                            <span>Next</span>
                            <div class="loading-next" id="nextLoader"></div>
                        </button>
                    </div>

                    <!-- Step 2: Password -->
                    <div class="step-container step-2" id="step2">
                        <div class="form-group-custom">
                            <div class="input-wrapper">
                                <span class="input-icon"><i class="fas fa-lock"></i></span>
                                <input type="password" placeholder="Password" name="password" id="passwordInput">
                            </div>
                        </div>
                        <button type="submit" class="btn-submit">Sign In</button>
                    </div>

                    <div class="text-center w-100 mt-3">
                        <a href="{% url 'password_reset' %}" class="forgot-pass">Forgot Password?</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        function checkUsername() {
            $('#djangoMessages').hide(); // Clear old error from previous attempt
            const emailInput = $('#emailInput');
            const email = emailInput.val().trim();
            emailInput.val(email); // Update field with trimmed value

            if (!email) {
                showAlert("Please enter your email");
                return;
            }

            $('#nextLoader').show();
            $('.btn-next span').text('Checking...');

            $.ajax({
                url: "{% url 'get_user_profile_pic' %}",
                type: "POST",
                data: {
                    'email': email,
                    'csrfmiddlewaretoken': '{{ csrf_token }}'
                },
                success: function (response) {
                    console.log("Response:", response);
                    $('#nextLoader').hide();
                    $('.btn-next span').text('Next');

                    if (response.status === 'success') {
                        // Update UI for step 2
                        $('#userProfilePic').attr('src', response.url).show();
                        $('#defaultAvatar').hide();

                        // Transition
                        $('#step1').css({ 'opacity': '0', 'transform': 'translateX(-40px)' });
                        setTimeout(() => {
                            $('#step1').hide();
                            $('#step2').show();
                            setTimeout(() => {
                                $('#step2').css({ 'opacity': '1', 'transform': 'translateX(0)' });
                                $('.btn-back').fadeIn();
                                $('#passwordInput').focus();
                            }, 50);
                        }, 400);

                        $('#ajaxAlert').hide();
                    } else if (response.message) {
                        showAlert(response.message);
                    } else {
                        showAlert("Account not found");
                    }
                },
                error: function (xhr) {
                    $('#nextLoader').hide();
                    $('.btn-next span').text('Next');
                    let errorMsg = "Something went wrong. Please try again.";
                    if (xhr.responseJSON && xhr.responseJSON.message) {
                        errorMsg = xhr.responseJSON.message;
                    }
                    showAlert(errorMsg);
                }
            });
        }

        function goBack() {
            $('.btn-back').fadeOut();
            $('#step2').css({ 'opacity': '0', 'transform': 'translateX(40px)' });

            setTimeout(() => {
                $('#step2').hide();
                $('#step1').show();
                setTimeout(() => {
                    $('#step1').css({ 'opacity': '1', 'transform': 'translateX(0)' });
                    $('#userProfilePic').hide();
                    $('#defaultAvatar').show();
                }, 50);
            }, 400);
        }

        function showAlert(msg) {
            $('#ajaxAlert').text(msg).fadeIn();
            setTimeout(() => {
                $('#ajaxAlert').fadeOut();
            }, 3000);
        }

        // Allow 'Enter' key on Username field to trigger 'Next'
        $('#emailInput').on('keypress', function (e) {
            if (e.which === 13) {
                e.preventDefault();
                checkUsername();
            }
        });
    </script>

</body>

</html>
