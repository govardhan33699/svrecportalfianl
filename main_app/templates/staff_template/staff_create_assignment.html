{% extends 'main_app/base.html' %} {% load static %} {% block page_title %}{{page_title}}{% endblock page_title %}  {% block content %}  <section class="content">     <div class="container-fluid">         <div class="row">             <div class="col-md-12">                 <div class="card card-dark">                     <div class="card-header">                         <h3 class="card-title">{{page_title}}</h3>                     </div>                     <form method="POST" enctype="multipart/form-data">                         {% csrf_token %}                         <div class="card-body">                             {% for message in messages %}                             <div class="alert alert-{{message.tags}} alert-dismissible fade show" role="alert">                                 {{ message }}                                 <button type="button" class="close" data-dismiss="alert" aria-label="Close">                                     <span aria-hidden="true">&times;</span>                                 </button>                             </div>                             {% endfor %}                             {% for field in form %}                             <div class="form-group">                                 <label>{{ field.label }}</label>                                 {{ field }}                             </div>                             {% endfor %}                         </div>                         <div class="card-footer">                             <button type="submit" class="btn btn-primary btn-block">Create Assignment</button>                         </div>                     </form>                 </div>             </div>         </div>     </div> </section> {% endblock content %}
