{% extends 'main_app/erpnext_base.html' %} {% load static %} {% block page_title %}{{ page_title }}{% endblock page_title %}  {% block content %} <section class="content">     <div class="container-fluid">         <div class="row">             <div class="col-md-12">                 <div class="card card-dark">                     <div class="card-header">                         <h3 class="card-title">{{ page_title }}</h3>                     </div>                     <form role="form" method="POST">                         {% csrf_token %}                         <div class="card-body">                             <div class="form-group">                                 <label>Internship Title</label>                                 <input type="text" class="form-control" name="title" value="{{ internship.title }}"                                     required>                             </div>                             <div class="form-group">                                 <label>Company</label>                                 <input type="text" class="form-control" name="company" value="{{ internship.company }}"                                     required>                             </div>                             <div class="form-group">                                 <label>Description</label>                                 <textarea class="form-control" name="description" rows="5"                                     required>{{ internship.description }}</textarea>                             </div>                             <div class="form-group">                                 <label>Application Link (Optional)</label>                                 <input type="url" class="form-control" name="link"                                     value="{{ internship.link|default:'' }}">                             </div>                             <div class="form-group">                                 <label>Deadline</label>                                 <input type="date" class="form-control" name="deadline"                                     value="{{ internship.deadline|date:'Y-m-d' }}" required>                             </div>                         </div>                         <div class="card-footer">                             <button type="submit" class="btn btn-primary btn-block">Update Internship</button>                         </div>                     </form>                 </div>             </div>         </div>     </div> </section> {% endblock content %}
