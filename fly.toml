# fly.toml app configuration file
# App name and region will be set during launch

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[mounts]
  source = "svrec_data"
  destination = "/data"

[env]
  DJANGO_DEBUG = "False"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
